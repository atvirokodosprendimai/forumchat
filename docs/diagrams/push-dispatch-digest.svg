<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420" font-family="Inter, system-ui, sans-serif" font-size="13">
  <rect width="100%" height="100%" fill="#f7f8fb"/>

  <rect x="20" y="20" width="220" height="380" fill="#ffffff" stroke="#c6cde0" rx="10"/>
  <text x="130" y="46" text-anchor="middle" font-weight="700">Event source</text>
  <rect x="40" y="70" width="180" height="40" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="130" y="92" text-anchor="middle">chat @mention</text>
  <rect x="40" y="118" width="180" height="40" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="130" y="140" text-anchor="middle">forum new thread</text>
  <rect x="40" y="166" width="180" height="40" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="130" y="188" text-anchor="middle">new project</text>
  <rect x="40" y="214" width="180" height="40" fill="#fff5e6" stroke="#f0d9a8" rx="6"/>
  <text x="130" y="232" text-anchor="middle">issue · comment</text>
  <text x="130" y="248" text-anchor="middle" font-size="11">(reserved)</text>
  <rect x="40" y="262" width="180" height="40" fill="#fff5e6" stroke="#f0d9a8" rx="6"/>
  <text x="130" y="280" text-anchor="middle">report (mod)</text>
  <text x="130" y="296" text-anchor="middle" font-size="11">(reserved)</text>
  <text x="130" y="338" text-anchor="middle" font-size="11">handlers call</text>
  <text x="130" y="354" text-anchor="middle" font-size="11">PushNotify closure</text>
  <text x="130" y="370" text-anchor="middle" font-size="11">(no import on push)</text>

  <rect x="280" y="20" width="320" height="380" fill="#ffffff" stroke="#c6cde0" rx="10"/>
  <text x="440" y="46" text-anchor="middle" font-weight="700">push.Sender</text>
  <rect x="300" y="70" width="280" height="50" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="440" y="92" text-anchor="middle">SendToUsers / SendToCommunity</text>
  <text x="440" y="108" text-anchor="middle" font-size="11">group subs by user_id</text>
  <rect x="300" y="132" width="280" height="40" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="440" y="155" text-anchor="middle">user has digest_minutes &gt; 0?</text>
  <rect x="300" y="184" width="134" height="60" fill="#fff5e6" stroke="#f0d9a8" rx="6"/>
  <text x="367" y="206" text-anchor="middle">yes</text>
  <text x="367" y="222" text-anchor="middle" font-size="11">AddPending</text>
  <text x="367" y="238" text-anchor="middle" font-size="11">→ push_pending row</text>
  <rect x="446" y="184" width="134" height="60" fill="#fff5e6" stroke="#f0d9a8" rx="6"/>
  <text x="513" y="206" text-anchor="middle">no</text>
  <text x="513" y="222" text-anchor="middle" font-size="11">SendNow</text>
  <text x="513" y="238" text-anchor="middle" font-size="11">→ webpush-go</text>
  <rect x="300" y="256" width="280" height="50" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="440" y="278" text-anchor="middle">410/404 → DeleteByEndpoint</text>
  <text x="440" y="294" text-anchor="middle" font-size="11">browser unsubscribed; self-heal</text>
  <rect x="300" y="320" width="280" height="60" fill="#fff5e6" stroke="#f0d9a8" rx="6"/>
  <text x="440" y="342" text-anchor="middle" font-weight="700">DigestWorker (30s ticker)</text>
  <text x="440" y="358" text-anchor="middle" font-size="11">DueDigests → ListPending → BuildDigest</text>
  <text x="440" y="374" text-anchor="middle" font-size="11">SendNow + SetDigestLastAt + DeletePendingByIDs</text>

  <rect x="640" y="20" width="220" height="380" fill="#ffffff" stroke="#c6cde0" rx="10"/>
  <text x="750" y="46" text-anchor="middle" font-weight="700">Recipient</text>
  <rect x="660" y="70" width="180" height="50" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="750" y="92" text-anchor="middle">push service</text>
  <text x="750" y="108" text-anchor="middle" font-size="11">FCM / APNs / Mozilla</text>
  <rect x="660" y="134" width="180" height="50" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="750" y="156" text-anchor="middle">sw.js push event</text>
  <text x="750" y="172" text-anchor="middle" font-size="11">showNotification(title,body)</text>
  <rect x="660" y="198" width="180" height="50" fill="#e8ebff" stroke="#5b6cff" rx="6"/>
  <text x="750" y="220" text-anchor="middle">notificationclick</text>
  <text x="750" y="236" text-anchor="middle" font-size="11">focus existing tab</text>
  <text x="750" y="254" text-anchor="middle" font-size="11">or openWindow(payload.url)</text>
  <rect x="660" y="262" width="180" height="50" fill="#fff5e6" stroke="#f0d9a8" rx="6"/>
  <text x="750" y="284" text-anchor="middle">digest payload</text>
  <text x="750" y="300" text-anchor="middle" font-size="11">"3 new updates"</text>
  <text x="750" y="316" text-anchor="middle" font-size="11">"2 mentions, 1 new thread"</text>

  <g stroke="#5b6cff" stroke-width="1.4" fill="none">
    <path d="M240 200 L300 152" marker-end="url(#e)"/>
    <path d="M580 92  L660 92" marker-end="url(#e)"/>
    <path d="M580 158 L660 158" marker-end="url(#e)"/>
    <path d="M580 350 L660 286" stroke-dasharray="4,4" marker-end="url(#e)"/>
  </g>
  <defs>
    <marker id="e" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#5b6cff"/>
    </marker>
  </defs>
</svg>
