<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460" font-family="Inter, system-ui, sans-serif" font-size="13">
  <rect width="100%" height="100%" fill="#f7f8fb"/>

  <g transform="translate(440 200)">
    <circle cx="-160" cy="0"  r="40" fill="#e8ebff" stroke="#5b6cff"/>
    <text x="-160" y="4" text-anchor="middle" font-weight="700">peer A</text>
    <circle cx="160"  cy="0"  r="40" fill="#e8ebff" stroke="#5b6cff"/>
    <text x="160" y="4" text-anchor="middle" font-weight="700">peer B</text>
    <circle cx="0"    cy="160" r="40" fill="#e8ebff" stroke="#5b6cff"/>
    <text x="0" y="164" text-anchor="middle" font-weight="700">peer C</text>

    <g stroke="#5b6cff" stroke-width="1.5" fill="none">
      <path d="M-120 -10 L120 -10"/>
      <path d="M120  10 L-120 10"/>
      <path d="M-130 30  L-15 145"/>
      <path d="M-10 130  L-125 15"/>
      <path d="M130 30   L15 145"/>
      <path d="M10 130   L125 15"/>
    </g>
    <text x="0" y="-22" text-anchor="middle" font-size="11">camera + screen + audio</text>
    <text x="-110" y="100" text-anchor="middle" font-size="11" transform="rotate(-50 -110 100)">RTCPeerConnection</text>
    <text x="110" y="100" text-anchor="middle" font-size="11" transform="rotate(50 110 100)">RTCPeerConnection</text>
  </g>

  <rect x="20" y="20" width="280" height="80" fill="#fff5e6" stroke="#f0d9a8" rx="8"/>
  <text x="160" y="44" text-anchor="middle" font-weight="700">Signaling SSE</text>
  <text x="160" y="62" text-anchor="middle" font-size="11">offer · answer · ice · meta · bye</text>
  <text x="160" y="80" text-anchor="middle" font-size="11">routed via per-participant mailbox</text>
  <text x="160" y="96" text-anchor="middle" font-size="11">server stays neutral to payload</text>

  <rect x="580" y="20" width="280" height="80" fill="#fff5e6" stroke="#f0d9a8" rx="8"/>
  <text x="720" y="44" text-anchor="middle" font-weight="700">Membership + ICE</text>
  <text x="720" y="62" text-anchor="middle" font-size="11">rooms.State (in-process)</text>
  <text x="720" y="80" text-anchor="middle" font-size="11">heartbeats · janitor · TURN config</text>

  <rect x="20" y="370" width="400" height="80" fill="#fff5e6" stroke="#f0d9a8" rx="8"/>
  <text x="220" y="394" text-anchor="middle" font-weight="700">Per-peer tracks (rooms.js)</text>
  <text x="220" y="412" text-anchor="middle" font-size="11">camera sender · screen sender · audio sender</text>
  <text x="220" y="428" text-anchor="middle" font-size="11">each MediaStream → own tile (self:camera, self:screen, peer:streamID)</text>

  <rect x="460" y="370" width="400" height="80" fill="#fff5e6" stroke="#f0d9a8" rx="8"/>
  <text x="660" y="394" text-anchor="middle" font-weight="700">meta envelope</text>
  <text x="660" y="412" text-anchor="middle" font-size="11">{ streams: { streamID → 'camera' | 'screen' } }</text>
  <text x="660" y="428" text-anchor="middle" font-size="11">receivers label incoming tiles correctly</text>

  <g stroke="#5b6cff" stroke-width="1.2" fill="none" stroke-dasharray="3,3">
    <path d="M160 100 L280 180" marker-end="url(#c)"/>
    <path d="M160 100 L600 180" marker-end="url(#c)"/>
    <path d="M160 100 L440 360" marker-end="url(#c)"/>
    <path d="M720 100 L600 180" marker-end="url(#c)"/>
  </g>
  <defs>
    <marker id="c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#5b6cff"/>
    </marker>
  </defs>
</svg>
