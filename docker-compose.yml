services:
  app:
    build: .
    depends_on:
      - nats
      - mailpit
    environment:
      ENV: dev
      HTTP_ADDR: ":8080"
      BASE_URL: "http://localhost:8080"
      DB_PATH: "/data/forumchat.db"
      NATS_URL: "nats://nats:4222"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "forumchat@localhost"
      UPLOADS_DIR: "/uploads"
      MIGRATE_ON_BOOT: "true"
    volumes:
      - app-data:/data
      - app-uploads:/uploads
    ports:
      - "8080:8080"

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  app-data:
  app-uploads:
